services:
  # Backend WebSocket server
  - type: web
    name: undercover-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
    plan: free

  # Frontend static site
  - type: web
    name: undercover-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_SERVER_URL
        fromService:
          name: undercover-server
          type: web
          property: host
          transform: "https://${value}"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    plan: free
